version: '3.8'

services:
  srs:
    image: registry.cn-hangzhou.aliyuncs.com/ossrs/srs:6
    container_name: srs
    restart: unless-stopped
    # 优先使用本地镜像，避免重复拉取
    pull_policy: never
    ports:
      # HTTP API 和 Web 播放器
      - "8080:8080"
      # RTMP 推流/播放
      - "1935:1935"
      # WebRTC 推流/播放 (UDP)
      - "8000:8000/udp"
      # SRT 推流/播放
      - "10080:10080/udp"
      # GB28181 TCP
      - "5060:5060"
      # GB28181 UDP
      - "5060:5060/udp"
      # GB28181 媒体端口范围
      - "9000-9999:9000-9999/udp"
    volumes:
      - ./conf/srs.conf:/usr/local/srs/conf/srs.conf:ro
      - ./logs:/usr/local/srs/objs/logs
      - ./hls:/usr/local/srs/objs/nginx/html
    environment:
      - SRS_LOG_LEVEL=info
    command: ./objs/srs -c conf/srs.conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/versions"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
