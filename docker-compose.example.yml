version: '3.8'

services:
  # Nginx 网关
  nginx:
    image: nginx:alpine
    container_name: misty-isle-gateway
    ports:
      - "80:80"
      - "443:443"  # 如果需要 HTTPS
    volumes:
      - ./conf/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      # 如果需要 HTTPS，挂载证书
      # - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
      - srs
    networks:
      - misty-isle-network
    restart: unless-stopped

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: misty-isle-backend
    environment:
      # ==================== 数据库配置（外部数据库）====================
      - DB_HOST=your-postgres-host
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=your-db-password
      - DB_NAME=misty_isle

      # ==================== Redis 配置（外部 Redis）====================
      - REDIS_HOST=your-redis-host
      - REDIS_PORT=6379
      - REDIS_PASSWORD=

      # ==================== R2 存储配置 ====================
      - R2_ENDPOINT=https://your-account-id.r2.cloudflarestorage.com
      - R2_ACCESS_KEY_ID=your-r2-access-key
      - R2_SECRET_ACCESS_KEY=your-r2-secret-key
      - R2_BUCKET=misty-isle
      - R2_PUBLIC_URL=https://cdn.yourdomain.com

      # ==================== JWT 配置 ====================
      - JWT_SECRET=change-this-to-a-very-long-random-secret-key-at-least-32-characters
      - JWT_EXPIRE_HOURS=72

      # ==================== SMTP 邮件配置 ====================
      - SMTP_HOST=smtp.qq.com
      - SMTP_PORT=587
      - SMTP_USER=your-email@qq.com
      - SMTP_PASSWORD=your-smtp-password
      - SMTP_FROM=雾屿花间

      # ==================== Modal 视频处理 ====================
      - MODAL_VIDEO_PROCESSOR_URL=https://your-modal-endpoint.modal.run

      # ==================== SRS 配置（内部通信）====================
      - SRS_BASE_URL=http://srs:8080
      - SRS_RTMP_URL=rtmp://srs:1935

      # ==================== 服务配置 ====================
      - SERVER_PORT=8081
      - ENV=production
    networks:
      - misty-isle-network
    restart: unless-stopped
    depends_on:
      - srs

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # ==================== 前端构建环境变量 ====================
        - VITE_API_BASE_URL=/api/v1
        - VITE_WS_BASE_URL=wss://yourdomain.com/api/v1
        - VITE_SRS_BASE_URL=/srs
        - VITE_CDN_BASE_URL=https://cdn.yourdomain.com
    container_name: misty-isle-frontend
    networks:
      - misty-isle-network
    restart: unless-stopped

  # SRS 直播服务器
  srs:
    image: ossrs/srs:6
    container_name: misty-isle-srs
    volumes:
      - ./conf/srs.prod.conf:/usr/local/srs/conf/srs.conf:ro
    environment:
      # WebRTC 候选地址（改为你的服务器公网 IP）
      - CANDIDATE=0.0.0.0
    ports:
      - "1935:1935"      # RTMP
      - "8000:8000/udp"  # WebRTC
      - "10080:10080/udp" # SRT
    networks:
      - misty-isle-network
    restart: unless-stopped

networks:
  misty-isle-network:
    driver: bridge
