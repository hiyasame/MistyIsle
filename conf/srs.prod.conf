# SRS 6 直播服务器配置（生产环境）

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          8080;
}

# RTMP 服务
vhost __defaultVhost__ {
    gop_cache       on;
    queue_length    10;
    min_latency     off;
    mr              off;
    mw_latency      100;

    dvr {
        enabled             off;
    }

    # HLS 配置（可选，用于录制/回放）
    hls {
        enabled         off;
        hls_path        ./objs/nginx/html;
        hls_fragment    10;
        hls_window      60;
        hls_m3u8_file   [app].m3u8;
        hls_ts_file     [app]-[seq].ts;
        hls_cleanup     on;
        hls_wait_keyframe on;
    }

    # HTTP-FLV 配置（用于低延迟直播）
    http_remux {
        enabled         on;
        # 挂载路径：/[app].flv (因为 OBS 推流时 app=live/ROOMID)
        mount           [vhost]/[app].flv;
        # 快速缓存，降低延迟
        fast_cache      10;
    }

    # HTTP 回调配置（指向后端服务）
    http_hooks {
        enabled         on;
        # 推流开始（通过内网 docker 网络访问）
        on_publish      http://backend:8081/srs/callback;
        # 推流结束
        on_unpublish    http://backend:8081/srs/callback;
    }

    # WebRTC
    rtc {
        enabled     on;
        rtmp_to_rtc on;
        rtc_to_rtmp on;
    }

    # SRT
    srt {
        enabled     on;
        srt_to_rtmp on;
    }
}

# WebRTC 配置
rtc_server {
    enabled         on;
    listen          8000;
    candidate       $CANDIDATE;
}

# SRT 配置
srt_server {
    enabled         on;
    listen          10080;
    maxbw           1000000000;
    connect_timeout 4000;
    peerlatency     0;
    recvlatency     0;
}
