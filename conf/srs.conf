# SRS 6 直播服务器配置（CDN 版）

listen              1935;
max_connections     100;
daemon              off;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          8080;
}

# RTMP 服务
vhost __defaultVhost__ {
    gop_cache       on;
    queue_length    10;
    min_latency     off;
    mr              off;
    mw_latency      100;

    dvr {
        enabled             off;
    }

    # HLS 配置（用于 CDN 分发）
    hls {
        enabled         on;
        # 切片保存路径
        hls_path        ./objs/nginx/html;
        # 切片时长（秒）
        hls_fragment    10;
        # 窗口大小（保留多少个切片）
        hls_window      60;
        # m3u8 文件名规则：[stream].m3u8
        hls_m3u8_file   [app]/[stream].m3u8;
        # 切片文件名规则
        hls_ts_file     [app]/[stream]-[seq].ts;
        # 清理过期切片
        hls_cleanup     on;
        # 是否等待关键帧
        hls_wait_keyframe on;
    }
}

# WebRTC 配置
rtc_server {
    enabled         on;
    listen          8000;
    candidate       $CANDIDATE;
}

vhost __defaultVhost__ {
    rtc {
        enabled     on;
        rtmp_to_rtc on;
        rtc_to_rtmp on;
    }
}

# SRT 配置
srt_server {
    enabled         on;
    listen          10080;
    maxbw           1000000000;
    connect_timeout 4000;
    peerlatency     0;
    recvlatency     0;
}

vhost __defaultVhost__ {
    srt {
        enabled     on;
        srt_to_rtmp on;
    }
}
